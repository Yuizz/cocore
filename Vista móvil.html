<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cocore — Vista móvil</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  body { margin:0; background:#2b2520; font-family:var(--font-body); }
  header { padding:36px 40px 8px; }
  header h1 { font-family:var(--font-display); font-weight:400; color:var(--on-dark); font-size:32px; letter-spacing:-1px; margin:0; }
  header p { color:var(--on-dark-soft); font-size:14px; margin:8px 0 0; max-width:640px; line-height:1.5; }
  .grid { display:grid; grid-template-columns:repeat(3, 390px); gap:40px 32px; padding:32px 40px 64px; justify-content:center; }
  @media (max-width:1340px){ .grid{ grid-template-columns:repeat(2, 390px); } }
  @media (max-width:900px){ .grid{ grid-template-columns:390px; } }
  .col { display:flex; flex-direction:column; }
  .label { color:var(--on-dark-soft); font-size:12px; letter-spacing:1.4px; text-transform:uppercase; text-align:center; margin-bottom:10px; }
  .phone { width:390px; height:760px; border-radius:38px; overflow:hidden; background:#000; padding:10px; box-shadow:0 24px 60px rgba(0,0,0,.45); }
  .phone iframe { width:390px; height:740px; border:0; border-radius:28px; background:var(--canvas); }
</style></head>
<body>
  <header>
    <h1>cocore — vista móvil</h1>
    <p>Las 9 páginas del sitio renderizadas a 390px de ancho. Cada una es responsive: nav con menú, layouts a una columna, filtros colapsables y timeline vertical.</p>
  </header>
  <div class="grid" id="grid"></div>
<script>
  const pages = [
    ['Home A', 'index.html'], ['Home B', 'home-b.html'], ['Home C', 'home-c.html'],
    ['Catálogo', 'catalogo.html'], ['Producto', 'producto.html?id=vasija-pequena'],
    ['Pedidos', 'pedidos.html'], ['About', 'about.html'], ['FAQ', 'faq.html'], ['Contacto', 'contacto.html'],
  ];
  const grid = document.getElementById('grid');
  pages.forEach(([label, href]) => {
    const col = document.createElement('div'); col.className = 'col';
    col.innerHTML = `<div class="label">${label}</div><div class="phone"><iframe src="${href}"></iframe></div>`;
    grid.appendChild(col);
  });
</script>
</body></html>
